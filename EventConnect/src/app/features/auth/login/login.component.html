<div class="login-page">
  <div class="login-container">
    <form class="login-form" [formGroup]="loginForm" (ngSubmit)="onSubmit()">      <div class="logo-wrapper">
        <div class="logo-card">
          <img src="assets/images/logo.png" class="logo" alt="EventConnect">
        </div>
      </div>

      <div class="form-header">
        <h2>Iniciar sesión</h2>
        <p class="subtitle">Bienvenido de nuevo a EventConnect</p>
      </div>

      <div class="input-group">
        <span class="input-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
        </span>
        <input
          type="email"
          placeholder="Correo electrónico"
          formControlName="email"
        >
      </div>
      <small class="error" *ngIf="email?.touched && email?.invalid">
        Introduce un correo válido
      </small>

      <div class="input-group">
        <span class="input-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </span>
        <input
          type="password"
          placeholder="Contraseña"
          formControlName="password"
        >
      </div>
      <small class="error" *ngIf="password?.touched && password?.invalid">
        La contraseña es obligatoria
      </small>

      <div class="forgot-password">
        <a routerLink="/forgot-password">¿Olvidaste tu contraseña?</a>
      </div>

      <button type="submit" class="login-btn" [disabled]="isSubmitting">
        <span *ngIf="!isSubmitting">Entrar</span>
        <span *ngIf="isSubmitting" class="spinner-wrapper">
          <span class="spinner"></span> Entrando...
        </span>
      </button>

      <div class="divider"><span>o continúa con</span></div>

      <button type="button" class="google-btn" (click)="loginWithGoogle()">
        <svg width="18" height="18" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.2l6.8-6.8C35.8 2.5 30.3 0 24 0 14.6 0 6.6 5.4 2.7 13.3l7.9 6.1C12.4 13.1 17.7 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4.1 7.1-10.1 7.1-17z"/>
          <path fill="#FBBC05" d="M10.6 28.6A14.8 14.8 0 0 1 9.5 24c0-1.6.3-3.2.8-4.6L2.4 13.3A23.9 23.9 0 0 0 0 24c0 3.8.9 7.4 2.5 10.6l8.1-6z"/>
          <path fill="#34A853" d="M24 48c6.5 0 11.9-2.1 15.9-5.8l-7.5-5.8c-2.1 1.4-4.8 2.2-8.4 2.2-6.3 0-11.6-3.6-13.4-8.9l-8 6.1C6.5 42.6 14.6 48 24 48z"/>
        </svg>
        Google
      </button>

      <p class="error server-error" *ngIf="errorMessage">{{ errorMessage }}</p>

      <p class="register-link">
        ¿No tienes cuenta? <a routerLink="/register">Crear cuenta</a>
      </p>
    </form>

    <div class="login-image">
      <div class="image-overlay">
        <h3>Conecta con tu ciudad</h3>
        <p>Descubre y organiza eventos cerca de ti</p>
      </div>
    </div>
  </div>
</div>
