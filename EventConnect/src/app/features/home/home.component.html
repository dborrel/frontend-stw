<app-header></app-header>

<section class="hero">
  <div class="hero-content">
    <h1>Descubre qué hacer<br>hoy en Zaragoza</h1>    <div class="search">
      <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle>
        <path d="m21 21-4.35-4.35"></path>
      </svg>
      <input placeholder="Buscar eventos ...">
      <button>Buscar</button>
    </div>
  </div>
</section>

<section class="featured">
  <h2>Eventos destacados</h2>

  <p *ngIf="loading">Cargando eventos...</p>
  <p *ngIf="error">Error al cargar los eventos.</p>

  <div class="events" *ngIf="!loading && !error">
    <app-event-card
      *ngFor="let event of events"
      [event]="event">
    </app-event-card>
  </div>

</section>

<section class="advisor">
  <div class="advisor-card">

    <div class="advisor-content">
      <h2>SpAlk te aconseja, ¿qué buscas?</h2>

      <p class="question">¿Qué tipo de quedada quieres?</p>

      <div class="options">
        <button 
          *ngFor="let option of options"
          [class.active]="selectedOption === option"
          (click)="selectOption(option)">
          {{ option.label }}
        </button>
      </div>

      <p class="response" *ngIf="response">
        {{ response }}
      </p>

      <button class="cta" *ngIf="response" (click)="goToActivity()">
        Ir a la actividad
      </button>
    </div>

    <!-- Avatar -->
    <img src="/assets/images/Spike.svg" class="advisor-avatar" />

  </div>
</section>
